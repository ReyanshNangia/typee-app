  <rect x="14" y="14" width="228" height="228" rx="52" fill="url(#bg)" stroke="#E4DBC2" stroke-width="2.5" filter="url(#soft)"/>
  <g fill="#8C6647">
    <!-- crossbar -->
    <rect x="60" y="74" width="136" height="32" rx="6"/>
    <!-- stem -->
