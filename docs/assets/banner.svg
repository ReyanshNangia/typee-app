<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Typee — a fast, floating notepad for your menu bar">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFAF1"/>
      <stop offset="1" stop-color="#F1EAD2"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5EFDD"/>
    </linearGradient>
    <filter id="bshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#8C6647" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bbg)"/>

  <!-- faint notebook rules -->
  <g stroke="#E6DDC4" stroke-width="2" opacity="0.55">
    <line x1="80" y1="120" x2="1120" y2="120"/>
    <line x1="80" y1="170" x2="1120" y2="170"/>
    <line x1="80" y1="220" x2="1120" y2="220"/>
    <line x1="80" y1="270" x2="1120" y2="270"/>
    <line x1="80" y1="320" x2="1120" y2="320"/>
  </g>

  <!-- logo tile -->
  <g filter="url(#bshadow)">
    <rect x="150" y="120" width="180" height="180" rx="42" fill="url(#tile)" stroke="#E4DBC2" stroke-width="2"/>
    <g fill="#8C6647" transform="translate(150,120) scale(0.703)">
      <rect x="60" y="74" width="136" height="32" rx="6"/>
      <rect x="111" y="74" width="34" height="116" rx="6"/>
      <rect x="92" y="178" width="72" height="14" rx="6"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="380" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="bold" fill="#5C4632">Typee</text>
  <text x="384" y="270" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" fill="#8A7A63">A fast, floating notepad for your menu bar.</text>
</svg>
